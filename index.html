<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Inspection Report</title>

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#0B2545">

<link rel="icon" href="logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#eceff1;
    color:#222;

}

header{

    background:#0B2545;
    color:white;

    padding:20px;

    display:flex;

    align-items:center;

    gap:20px;

}

header img{

    height:70px;

}

header h1{

    font-size:30px;

}

header p{

    margin-top:4px;

    opacity:.85;

}

.container{

    max-width:1200px;

    margin:25px auto;

    background:white;

    padding:25px;

    border-radius:12px;

    box-shadow:0 4px 18px rgba(0,0,0,.12);

}

.section{

    margin-top:30px;

}

.section-title{

    background:#F7C600;

    padding:10px 15px;

    border-radius:8px;

    font-weight:bold;

    margin-bottom:15px;

}

.grid4{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;

}

.grid3{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

}

label{

    display:block;

    margin-bottom:6px;

    font-size:14px;

    font-weight:bold;

}

input[type=text],
input[type=date],
input[type=time],
textarea{

    width:100%;

    padding:10px;

    border:1px solid #DDD;

    border-radius:8px;

    font-size:15px;

}

textarea{

    resize:vertical;

    min-height:120px;

}

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#f1f1f1;

}

th,
td{

    border:1px solid #DDD;

    padding:10px;

}

th.ok,
td.ok{

    width:60px;

    text-align:center;

}

th.nok,
td.nok{

    width:60px;

    text-align:center;

}

table input[type=radio]{

    transform:scale(1.3);

    cursor:pointer;

}

.preview{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-top:15px;

}

.preview img{

    width:180px;

    height:140px;

    object-fit:cover;

    border-radius:8px;

    box-shadow:0 3px 10px rgba(0,0,0,.15);

}

button{

    background:#F7C600;

    border:none;

    padding:16px 45px;

    border-radius:8px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    opacity:.9;

}

#loading{

    display:none;

    margin-top:15px;

    font-weight:bold;

    color:#0B2545;

}

@media(max-width:900px){

    .grid4{

        grid-template-columns:1fr;

    }

    .grid3{

        grid-template-columns:1fr;

    }

    header{

        flex-direction:column;

        text-align:center;

    }

}

</style>

</head>

<body>

<header>

<img src="logo.png">

<div>

<h1>Vehicle Inspection Report</h1>

<p>Relatório de Inspeção Veicular</p>

</div>

</header>

<div class="container">

<div class="section">

<div class="section-title">

Dados do Veículo

</div>

<div class="grid4">

<div>

<label>Prefixo</label>

<input
id="prefixo"
type="text"
maxlength="5"
required>

</div>

<div>

<label>Placa</label>

<input
id="placa"
type="text"
maxlength="8"
style="text-transform:uppercase"
required>

</div>

<div>

<label>Data</label>

<input
id="data"
type="date"
readonly>

</div>

<div>

<label>Hora</label>

<input
id="hora"
type="time"
readonly>

</div>

</div>

</div>

<div class="section">

<div class="section-title">

Checklist da Inspeção

</div>

<table>

<thead>

<tr>

<th>Item</th>

<th class="ok">✅</th>

<th class="nok">❌</th>

<th>Observação</th>

</tr>

</thead>

<tbody id="checklistBody">

</tbody>

</table>

</div>
<!-- ===========================
     FOTOS DA INSPEÇÃO
=========================== -->

<div class="section">

    <div class="section-title">

        Fotos da Inspeção

    </div>

    <div class="grid3">

        <div>

            <label>
                Foto Frontal / Front Photo
            </label>

            <input
                id="fotoFrontal"
                type="file"
                accept="image/*"
                capture="environment"
                multiple>

            <div
                id="previewFrontal"
                class="preview">
            </div>

        </div>

        <div>

            <label>
                Limpeza / Cleaning
            </label>

            <input
                id="fotoLimpeza"
                type="file"
                accept="image/*"
                capture="environment"
                multiple>

            <div
                id="previewLimpeza"
                class="preview">
            </div>

        </div>

        <div>

            <label>
                Segurança / Security
            </label>

            <input
                id="fotoSeguranca"
                type="file"
                accept="image/*"
                capture="environment"
                multiple>

            <div
                id="previewSeguranca"
                class="preview">
            </div>

        </div>

    </div>

</div>

<!-- ===========================
     OBSERVAÇÕES
=========================== -->

<div class="section">

    <div class="section-title">

        Observações Gerais

    </div>

    <textarea
        id="observacoes"
        placeholder="Digite observações adicionais...">
    </textarea>

</div>

<!-- ===========================
     MENSAGEM
=========================== -->

<div
    id="mensagem"
    style="margin-top:20px;color:#c62828;font-weight:bold;">
</div>

<!-- ===========================
     BOTÃO
=========================== -->

<div
    style="margin-top:35px;text-align:center;">

    <button
        id="btnGerar">

        GERAR RELATÓRIO

    </button>

    <div id="loading">

        Gerando relatório...

    </div>

</div>

</div>

<!-- ==========================================================
     INÍCIO DO JAVASCRIPT
=========================================================== -->

<script>

/* ==========================================================
   CONFIGURAÇÕES
========================================================== */

const APP = {

    gps:{
        latitude:null,
        longitude:null,
        accuracy:null
    },

    fotos:{
        frontal:[],
        limpeza:[],
        seguranca:[]
    }

};

/* ==========================================================
   CHECKLIST
========================================================== */

const CHECKLIST = [

{
categoria:"DOCUMENTAÇÃO",
itens:[
"CRLV",
"Certificado de Vistoria AGERBA",
"Certificado de Fretamento",
"Documento Cronotacógrafo"
]
},

{
categoria:"SEGURANÇA",
itens:[
"Extintor de Incêndio",
"Martelos de Emergência",
"Saídas de Emergência",
"Sinalização dos Degraus",
"Faixas Refletivas",
"Pneus",
"Cintos de Segurança",
"Assentos"
]
},

{
categoria:"LIMPEZA",
itens:[
"Limpeza Interna",
"Limpeza Externa"
]
}

];
    /* ==========================================================
   INICIALIZAÇÃO
========================================================== */

document.addEventListener("DOMContentLoaded", iniciarSistema);

function iniciarSistema(){

    preencherDataHora();

    criarChecklist();

    configurarFotos();

    obterGPS();

    document
        .getElementById("btnGerar")
        .addEventListener("click", gerarRelatorio);

}

/* ==========================================================
   DATA E HORA
========================================================== */

function preencherDataHora(){

    const agora = new Date();

    document.getElementById("data").value =
        agora.toISOString().split("T")[0];

    document.getElementById("hora").value =
        agora.toLocaleTimeString("pt-BR",{

            hour:"2-digit",

            minute:"2-digit"

        });

}

/* ==========================================================
   CRIAR CHECKLIST
========================================================== */

function criarChecklist(){

    const tbody=document.getElementById("checklistBody");

    tbody.innerHTML="";

    CHECKLIST.forEach(grupo=>{

        tbody.innerHTML+=`

        <tr style="background:#F7C600;font-weight:bold;">

            <td colspan="4">

                ${grupo.categoria}

            </td>

        </tr>

        `;

        grupo.itens.forEach(item=>{

            const id=item

                .normalize("NFD")

                .replace(/[\u0300-\u036f]/g,"")

                .replace(/\s+/g,"_")

                .toLowerCase();

            tbody.innerHTML+=`

            <tr>

                <td>${item}</td>

                <td class="ok">

                    <input

                    type="radio"

                    name="${id}"

                    value="OK"

                    checked>

                </td>

                <td class="nok">

                    <input

                    type="radio"

                    name="${id}"

                    value="NOK">

                </td>

                <td>

                    <input

                    id="obs_${id}"

                    type="text">

                </td>

            </tr>

            `;

        });

    });

}

/* ==========================================================
   GPS
========================================================== */

function obterGPS(){

    if(!navigator.geolocation){

        console.log("GPS não suportado.");

        return;

    }

    navigator.geolocation.getCurrentPosition(

        pos=>{

            APP.gps.latitude=pos.coords.latitude;

            APP.gps.longitude=pos.coords.longitude;

            APP.gps.accuracy=pos.coords.accuracy;

            console.log(APP.gps);

        },

        erro=>{

            console.log(erro);

        },

        {

            enableHighAccuracy:true,

            timeout:10000

        }

    );

}
/* ==========================================================
   FOTOS
========================================================== */

function configurarFotos(){

    document
        .getElementById("fotoFrontal")
        .addEventListener("change",function(){

            carregarPreview(
                this,
                "previewFrontal",
                APP.fotos.frontal
            );

        });

    document
        .getElementById("fotoLimpeza")
        .addEventListener("change",function(){

            carregarPreview(
                this,
                "previewLimpeza",
                APP.fotos.limpeza
            );

        });

    document
        .getElementById("fotoSeguranca")
        .addEventListener("change",function(){

            carregarPreview(
                this,
                "previewSeguranca",
                APP.fotos.seguranca
            );

        });

}

function carregarPreview(input,idPreview,lista){

    const preview=document.getElementById(idPreview);

    preview.innerHTML="";

    lista.length=0;

    [...input.files].forEach(file=>{

        lista.push(file);

        const reader=new FileReader();

        reader.onload=function(e){

            const img=document.createElement("img");

            img.src=e.target.result;

            preview.appendChild(img);

        };

        reader.readAsDataURL(file);

    });

}

/* ==========================================================
   COLETA DOS DADOS
========================================================== */

function coletarDados(){

    const agora = new Date();

    const dados = {

        idRelatorio: crypto.randomUUID(),

        versao: "1.0",

        geradoEm: agora.toISOString(),

        prefixo: document.getElementById("prefixo").value.trim(),

        placa: document
            .getElementById("placa")
            .value
            .trim()
            .toUpperCase(),

        data: document.getElementById("data").value,

        hora: document.getElementById("hora").value,

        observacoes: document
            .getElementById("observacoes")
            .value
            .trim(),

        gps: {

            latitude: APP.gps.latitude,

            longitude: APP.gps.longitude,

            accuracy: APP.gps.accuracy

        },

        checklist: [],

        fotos: {}

    };

    CHECKLIST.forEach(grupo=>{

        grupo.itens.forEach(item=>{

            const id = item

                .normalize("NFD")

                .replace(/[\u0300-\u036f]/g,"")

                .replace(/\s+/g,"_")

                .toLowerCase();

            const status = document.querySelector(

                `input[name="${id}"]:checked`

            ).value;

            const observacao = document
                .getElementById("obs_"+id)
                .value
                .trim();

            dados.checklist.push({

                categoria: grupo.categoria,

                item: item,

                status: status,

                observacao: observacao

            });

        });

    });

    return dados;

}

/* ==========================================================
   BOTÃO
========================================================== */

function gerarRelatorio(){

    document.getElementById("mensagem").innerHTML="";

    if(document.getElementById("prefixo").value==""){

        document.getElementById("mensagem").innerHTML=
        "Informe o prefixo.";

        return;

    }

    if(document.getElementById("placa").value==""){

        document.getElementById("mensagem").innerHTML=
        "Informe a placa.";

        return;

    }

    const dados=coletarDados();

    console.clear();

    console.log(dados);

    document.getElementById("loading").style.display="block";

    /*
        Próxima etapa:
        enviar para o Google Apps Script
    */

}
    /* ==========================================================
   CONFIGURAÇÃO GOOGLE APPS SCRIPT
========================================================== */

/*
   COLE A URL DO WEB APP AQUI APÓS O DEPLOY
*/

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyx1ZdrMOg0knU5xdK_u8uF8oUWhtRbisZ0C5IHo67fTEfwhhC-xiEkOG2DXJSVNohA/exec";


/* ==========================================================
   CONVERTER FOTO PARA BASE64
========================================================== */
/* ==========================================================
   REDUZIR FOTO
========================================================== */

function reduzirImagem(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = function(e){

            const img = new Image();

            img.onload = function(){

                let largura = img.width;
                let altura = img.height;

                const MAX = 1600;

                if(largura > altura){

                    if(largura > MAX){

                        altura = altura * MAX / largura;
                        largura = MAX;

                    }

                }else{

                    if(altura > MAX){

                        largura = largura * MAX / altura;
                        altura = MAX;

                    }

                }

                const canvas = document.createElement("canvas");

                canvas.width = largura;
                canvas.height = altura;

                const ctx = canvas.getContext("2d");

                ctx.drawImage(img,0,0,largura,altura);

                resolve(

                    canvas.toDataURL(

                        "image/jpeg",

                        0.80

                    )

                );

            };

            img.src = e.target.result;

        };

        reader.onerror = reject;

        reader.readAsDataURL(file);

    });

}


/* ==========================================================
   PREPARAR FOTOS
========================================================== */

async function prepararFotos(){

    const fotos = {

        frontal:[],

        limpeza:[],

        seguranca:[]

    };

    for(const file of APP.fotos.frontal){

        fotos.frontal.push({

            nome:file.name,

            base64:await reduzirImagem(file)

        });

    }

    for(const file of APP.fotos.limpeza){

        fotos.limpeza.push({

            nome:file.name,

            base64:await reduzirImagem(file)
        });

    }

    for(const file of APP.fotos.seguranca){

        fotos.seguranca.push({

            nome:file.name,

            base64:await reduzirImagem(file)

        });

    }

    return fotos;

}


/* ==========================================================
   ENVIAR PARA O GOOGLE APPS SCRIPT
========================================================== */

async function enviarRelatorio(){

    try{

        document.getElementById("loading").style.display="block";

       const dados = coletarDados();

dados.fotos = await prepararFotos();

console.log("OBJETO:");
console.log(dados);

console.log("JSON:");
console.log(JSON.stringify(dados));

alert(JSON.stringify(dados).substring(0,500));

const resposta = await fetch(
    WEB_APP_URL,
    {
        method: "POST",
        headers: {
            "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(dados)
    }
);


        const json = await resposta.json();

        document.getElementById("loading").style.display="none";

        if(json.status=="ok"){

            alert("Relatório enviado com sucesso.");

            console.log(json);

        }

        else{

            alert(json.message);

        }

    }

catch(e){

    console.error(e);

    erro("Erro ao enviar relatório.");

}

}


/* ==========================================================
   ALTERAR BOTÃO
========================================================== */

async function gerarRelatorio(){

    document.getElementById("mensagem").innerHTML="";

    if(document.getElementById("prefixo").value.trim()==""){

        document.getElementById("mensagem").innerHTML=
        "Informe o Prefixo.";

        return;

    }

    if(document.getElementById("placa").value.trim()==""){

        document.getElementById("mensagem").innerHTML=
        "Informe a Placa.";

        return;

    }

    await enviarRelatorio();

}
    /* ==========================================================
   LIMPAR FORMULÁRIO
========================================================== */

function limparFormulario(){

    document.getElementById("prefixo").value="";
    document.getElementById("placa").value="";
    document.getElementById("observacoes").value="";

    preencherDataHora();

    document.getElementById("previewFrontal").innerHTML="";
    document.getElementById("previewLimpeza").innerHTML="";
    document.getElementById("previewSeguranca").innerHTML="";

    document.getElementById("fotoFrontal").value="";
    document.getElementById("fotoLimpeza").value="";
    document.getElementById("fotoSeguranca").value="";

    APP.fotos.frontal=[];
    APP.fotos.limpeza=[];
    APP.fotos.seguranca=[];

    criarChecklist();
obterGPS();
}


/* ==========================================================
   SUCESSO
========================================================== */

function sucesso(resposta){

    document.getElementById("loading").style.display="none";

    alert("Relatório enviado com sucesso.");

    console.log(resposta);

    limparFormulario();

}


/* ==========================================================
   ERRO
========================================================== */

function erro(mensagem){

    document.getElementById("loading").style.display="none";

    alert(mensagem);

}


/* ==========================================================
   TESTE LOCAL
========================================================== */

console.log("Vehicle Inspection System");

console.log("Cidade Sol");

console.log("Versão 1.0");

</script>

</body>

</html>
